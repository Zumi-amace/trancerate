<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中文解析 - 中国語学習ツール</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<meta name="theme-color" content="#c8442e">
<meta name="apple-mobile-web-app-title" content="中文解析">
<style>
  :root{
    --ink:#1a1410;
    --paper:#f7f3ea;
    --surface:#fffdf8;
    --vermilion:#c8442e;
    --jade:#2f6f5e;
    --gold:#b08838;
    --line:#e6ddc9;
    --muted:#756b62;
    --bad:#9f2f25;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;
    padding:clamp(16px,4vw,44px);
    background:var(--paper);
    color:var(--ink);
    font-family:"Hiragino Sans","Noto Sans JP","Yu Gothic",-apple-system,
      BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    line-height:1.7;
  }
  .wrap{max-width:980px;margin:0 auto}
  .hanzi{font-family:"Songti SC","SimSun","Noto Serif SC",serif}
  header{
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;
    margin-bottom:22px;
    display:flex;
    gap:14px;
    align-items:flex-end;
    justify-content:space-between;
    flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:12px;min-width:260px}
  .seal{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:44px;
    height:44px;
    border-radius:6px;
    background:var(--vermilion);
    color:var(--paper);
    font-size:1.65rem;
    font-weight:800;
    line-height:1;
  }
  h1{margin:0;font-size:clamp(1.3rem,4vw,1.95rem);line-height:1.25;letter-spacing:0}
  .sub{margin:2px 0 0;color:var(--muted);font-size:.92rem}
  .status{
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--muted);
    border-radius:6px;
    padding:.38rem .65rem;
    font-size:.8rem;
    white-space:nowrap;
  }
  .status.ready{border-color:rgba(47,111,94,.35);color:var(--jade)}
  .panel{display:grid;gap:14px;margin-bottom:26px}
  .api-panel,.study-panel{
    display:grid;
    gap:10px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--surface);
    padding:12px;
  }
  details.api-panel,details.study-panel{display:block}
  details.api-panel > *,details.study-panel > *{margin-top:10px}
  details.api-panel > summary,details.study-panel > summary{margin-top:0}
  summary{
    cursor:pointer;
    font-weight:800;
    color:var(--ink);
    list-style:none;
  }
  summary::-webkit-details-marker{display:none}
  summary::after{
    content:"開く";
    float:right;
    color:var(--jade);
    font-size:.82rem;
  }
  details[open] > summary::after{content:"閉じる"}
  .api-row,.study-row{
    display:grid;
    grid-template-columns:repeat(2,minmax(170px,1fr));
    gap:10px;
  }
  .field{display:grid;gap:5px}
  .field label{margin:0;font-size:.82rem;color:var(--muted)}
  input[type="password"],input[type="text"],select{
    width:100%;
    border:1.5px solid var(--line);
    border-radius:6px;
    background:#fff;
    color:var(--ink);
    padding:.58rem .68rem;
    font:inherit;
  }
  input:focus,select:focus,textarea:focus{outline:3px solid rgba(176,136,56,.45);outline-offset:1px}
  .checks{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .check{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.84rem}
  .check input{width:16px;height:16px}
  .note{margin:0;color:var(--muted);font-size:.8rem}
  .dir,.tabs{
    display:inline-flex;
    width:max-content;
    border:1.5px solid var(--ink);
    border-radius:6px;
    overflow:hidden;
    background:var(--surface);
  }
  .dir button,.tabs button{
    appearance:none;
    border:0;
    border-radius:0;
    background:transparent;
    color:var(--muted);
    padding:.55rem .95rem;
    font-weight:700;
    font-size:.92rem;
    cursor:pointer;
  }
  .dir button[aria-pressed="true"],.tabs button[aria-pressed="true"]{background:var(--ink);color:var(--paper)}
  label{display:block;font-weight:700;margin-bottom:6px}
  textarea{
    display:block;
    width:100%;
    min-height:150px;
    resize:vertical;
    border:1.5px solid var(--ink);
    border-radius:6px;
    background:var(--surface);
    color:var(--ink);
    padding:15px;
    font-size:1.1rem;
    line-height:1.85;
  }
  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  button.action,button.secondary,button.ghost{
    appearance:none;
    border-radius:6px;
    padding:.68rem .95rem;
    font-size:.95rem;
    font-weight:800;
    cursor:pointer;
  }
  button.action{border:0;background:var(--vermilion);color:var(--paper);padding:.72rem 1.35rem;font-size:1rem}
  button.secondary{border:1.5px solid var(--jade);background:var(--surface);color:var(--jade)}
  button.ghost{border:1.5px solid var(--line);background:var(--surface);color:var(--ink)}
  button.secondary:hover:not(:disabled),button.ghost:hover:not(:disabled){background:rgba(47,111,94,.08)}
  button.secondary.listening{background:var(--jade);color:var(--paper)}
  button.action:hover:not(:disabled){filter:brightness(1.07)}
  button.action:active:not(:disabled),button.secondary:active:not(:disabled),button.ghost:active:not(:disabled){transform:translateY(1px)}
  button:disabled{opacity:.55;cursor:not-allowed}
  button:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .hint,.voice-state{color:var(--muted);font-size:.82rem}
  .voice-state.active{color:var(--jade);font-weight:700}
  .loading{display:none;align-items:center;gap:.6rem;color:var(--jade);font-weight:700}
  .loading.show{display:flex}
  .spinner{
    width:18px;
    height:18px;
    border:3px solid var(--line);
    border-top-color:var(--jade);
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.spinner{animation:none}}
  .error{
    display:none;
    border-left:4px solid var(--bad);
    background:#fbeae6;
    color:var(--ink);
    border-radius:0 6px 6px 0;
    padding:12px 14px;
  }
  .error.show{display:block}
  .error b{color:var(--bad)}
  #results{display:grid;gap:26px;margin-top:28px}
  .block{min-width:0}
  .block-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .eyebrow{
    display:inline-block;
    color:var(--vermilion);
    border-bottom:1.5px solid var(--vermilion);
    padding-bottom:2px;
    font-size:.73rem;
    font-weight:800;
    letter-spacing:.16em;
    text-transform:uppercase;
  }
  .translation{margin:0;font-size:1.15rem;line-height:1.9;overflow-wrap:anywhere}
  .native{
    margin:0;
    padding:14px 16px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--surface);
    color:var(--jade);
    font-size:1.08rem;
    line-height:2;
    overflow-wrap:anywhere;
  }
  .sandhi{color:var(--gold);font-weight:800;border-bottom:2px dotted var(--gold)}
  .legend{margin:.55rem 0 0;color:var(--muted);font-size:.82rem}
  .cards,.saved-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
  .card,.saved-item{
    min-width:0;
    border:1px solid var(--line);
    border-top:3px solid var(--jade);
    border-radius:6px;
    background:var(--surface);
    padding:12px;
  }
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .zh{font-size:1.62rem;font-weight:800;line-height:1.25;overflow-wrap:anywhere}
  .py{margin-top:2px;color:var(--vermilion);font-weight:800;overflow-wrap:anywhere}
  .mean{margin-top:8px;font-size:.94rem;overflow-wrap:anywhere}
  .pos{
    display:inline-block;
    margin-top:9px;
    border-radius:3px;
    background:var(--line);
    color:var(--muted);
    padding:.1rem .42rem;
    font-size:.72rem;
    font-weight:700;
  }
  .icon-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .speak,.icon-btn{
    appearance:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:34px;
    height:34px;
    flex:0 0 auto;
    border:1.5px solid var(--jade);
    border-radius:50%;
    background:transparent;
    color:var(--jade);
    cursor:pointer;
    font-size:1rem;
    line-height:1;
  }
  .icon-btn{border-color:var(--line);color:var(--ink)}
  .speak:hover,.speak.speaking{background:var(--jade);color:var(--paper)}
  .icon-btn:hover,.icon-btn.active{background:var(--gold);border-color:var(--gold);color:var(--paper)}
  .speak-sm,.icon-sm{width:29px;height:29px;font-size:.86rem}
  .examples{
    margin-top:10px;
    border-top:1px solid var(--line);
    padding-top:10px;
    display:grid;
    gap:8px;
    font-size:.9rem;
  }
  .example-line{margin:0}
  .saved-item button{margin-top:8px}
  .history-text{font-size:.92rem;line-height:1.6;overflow-wrap:anywhere}
  .hide-pinyin .py,.hide-pinyin .native,.hide-pinyin .legend{display:none}
  .hide-meaning .mean{display:none}
  .hide-translation .translation-output{display:none}
  footer{margin-top:38px;border-top:1px solid var(--line);padding-top:12px;color:var(--muted);font-size:.8rem}
  @media (max-width:540px){
    body{padding:14px}
    header{align-items:flex-start}
    .status{white-space:normal}
    .dir,.tabs{display:grid;grid-template-columns:1fr 1fr;width:100%}
    .dir button,.tabs button{padding:.55rem .5rem}
    .cards,.saved-list{grid-template-columns:1fr}
    .api-row,.study-row{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="seal hanzi">解</span>
      <div>
        <h1>中文解析</h1>
        <p class="sub">翻訳、ピンイン、声調変化、語彙、復習をまとめて確認</p>
      </div>
    </div>
    <div class="status" id="runtimeStatus">AI接続を確認中</div>
  </header>

  <main>
    <section class="panel" aria-label="入力">
      <div class="dir" role="group" aria-label="翻訳方向">
        <button id="dirZh" type="button" aria-pressed="true">中国語 → 日本語</button>
        <button id="dirJa" type="button" aria-pressed="false">日本語 → 中国語</button>
      </div>

      <details class="api-panel" aria-label="AI接続設定">
        <summary>AI接続設定</summary>
        <div class="api-row">
          <div class="field">
            <label for="runtimeMode">実行モード</label>
            <select id="runtimeMode">
              <option value="auto">自動</option>
              <option value="claude">Claude環境</option>
              <option value="anthropic">Anthropic APIキー</option>
            </select>
          </div>
          <div class="field">
            <label for="modelName">モデル</label>
            <input id="modelName" type="text" value="claude-sonnet-4-6" autocomplete="off">
          </div>
        </div>
        <div class="field">
          <label for="apiKey">Anthropic APIキー</label>
          <input id="apiKey" type="password" placeholder="sk-ant-..." autocomplete="off">
        </div>
        <div class="controls">
          <label class="check" for="rememberKey">
            <input id="rememberKey" type="checkbox">
            APIキーをこの端末に長期保存する
          </label>
          <button id="clearKey" class="ghost" type="button">保存キーを削除</button>
        </div>
        <p class="note">通常ブラウザで使う場合だけAPIキーを入力してください。長期保存は個人端末専用です。保存しない場合、キーはこのページを開いている間だけ使います。</p>
      </details>

      <details class="study-panel" aria-label="学習設定">
        <summary>学習設定</summary>
        <div class="study-row">
          <div class="field">
            <label for="speechRate">読み上げ速度</label>
            <select id="speechRate">
              <option value="0.7">ゆっくり 0.7x</option>
              <option value="0.9" selected>標準 0.9x</option>
              <option value="1">自然 1.0x</option>
            </select>
          </div>
          <div class="field">
            <label>表示</label>
            <div class="checks">
              <label class="check"><input id="hidePinyin" type="checkbox">ピンインを隠す</label>
              <label class="check"><input id="hideMeaning" type="checkbox">意味を隠す</label>
              <label class="check"><input id="hideTranslation" type="checkbox">訳を隠す</label>
            </div>
          </div>
        </div>
        <label class="check"><input id="autoAnalyzeVoice" type="checkbox">音声入力後に自動で解析する</label>
      </details>

      <div>
        <label for="input" id="inputLabel">中国語の文章</label>
        <textarea id="input" class="hanzi" placeholder="例: 你好，我想喝一杯咖啡。"></textarea>
      </div>

      <div class="controls">
        <button id="run" class="action" type="button">解析する</button>
        <button id="voiceInput" class="secondary" type="button">中国語で音声入力</button>
        <button id="copyResult" class="ghost" type="button">結果をコピー</button>
        <span class="hint">Ctrl + Enter でも実行</span>
        <span id="voiceState" class="voice-state"></span>
      </div>

      <div class="loading" id="loading" aria-live="polite">
        <span class="spinner" aria-hidden="true"></span>
        <span>解析中です</span>
      </div>
      <div class="error" id="error" role="alert"></div>
    </section>

    <section class="panel" aria-label="保存データ">
      <div class="tabs" role="group" aria-label="保存データの表示">
        <button id="tabResults" type="button" aria-pressed="true">解析結果</button>
        <button id="tabHistory" type="button" aria-pressed="false">履歴</button>
        <button id="tabFavorites" type="button" aria-pressed="false">単語帳</button>
      </div>
    </section>

    <section id="results" aria-live="polite"></section>
  </main>

  <footer>Claude環境ではAPIキーなしで動作します。通常ブラウザではAnthropic APIキーを入力して実行できます。</footer>
</div>

<script>
const $ = id => document.getElementById(id);
const inputEl = $("input");
const runBtn = $("run");
const voiceBtn = $("voiceInput");
const voiceStateEl = $("voiceState");
const loadEl = $("loading");
const errEl = $("error");
const resEl = $("results");
const statusEl = $("runtimeStatus");
const dirZhBtn = $("dirZh");
const dirJaBtn = $("dirJa");
const inputLabel = $("inputLabel");
const runtimeModeEl = $("runtimeMode");
const modelNameEl = $("modelName");
const apiPanelEl = document.querySelector(".api-panel");
const apiKeyEl = $("apiKey");
const rememberKeyEl = $("rememberKey");
const clearKeyBtn = $("clearKey");
const speechRateEl = $("speechRate");
const hidePinyinEl = $("hidePinyin");
const hideMeaningEl = $("hideMeaning");
const hideTranslationEl = $("hideTranslation");
const autoAnalyzeVoiceEl = $("autoAnalyzeVoice");
const copyResultBtn = $("copyResult");
const tabResultsBtn = $("tabResults");
const tabHistoryBtn = $("tabHistory");
const tabFavoritesBtn = $("tabFavorites");

const KEY_API = "trancerate.anthropicApiKey";
const KEY_API_SESSION = "trancerate.anthropicApiKey.session";
const KEY_HISTORY = "trancerate.history";
const KEY_FAVORITES = "trancerate.favorites";
const KEY_PREFS = "trancerate.preferences";

let direction = "zh2ja";
let zhVoice = null;
let recognition = null;
let isListening = false;
let voiceBaseText = "";
let voiceFinalText = "";
let lastResult = null;
let lastOriginalText = "";
let activeTab = "results";

function hasClaudeRuntime(){
  return Boolean(window.claude && typeof window.claude.complete === "function");
}

function readJSON(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(_err){
    return fallback;
  }
}

function writeJSON(key, value){
  try{
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  }catch(error){
    if (error && error.name === "QuotaExceededError"){
      showError("保存容量がいっぱいです。履歴や単語帳を少し削除してください。");
    }else{
      showError("保存に失敗しました。ブラウザのストレージ設定を確認してください。");
    }
    return false;
  }
}

function updateRuntimeStatus(){
  const mode = runtimeModeEl.value;
  const hasKey = apiKeyEl.value.trim().length > 0;
  if ((mode === "auto" && hasClaudeRuntime()) || mode === "claude"){
    statusEl.textContent = hasClaudeRuntime() ? "Claude接続: 利用可" : "Claude接続: 未検出";
    statusEl.classList.toggle("ready", hasClaudeRuntime());
  }else if (mode === "anthropic" || (mode === "auto" && hasKey)){
    statusEl.textContent = hasKey ? "Anthropic API: キー利用可" : "Anthropic API: キー未入力";
    statusEl.classList.toggle("ready", hasKey);
  }else{
    statusEl.textContent = "AI接続: 未設定";
    statusEl.classList.remove("ready");
  }
}

function loadSavedKey(){
  const saved = localStorage.getItem(KEY_API);
  const sessionSaved = sessionStorage.getItem(KEY_API_SESSION);
  // Long-term storage wins over the current-tab key when both exist.
  if (saved){
    apiKeyEl.value = saved;
    rememberKeyEl.checked = true;
  }else if (sessionSaved){
    apiKeyEl.value = sessionSaved;
    rememberKeyEl.checked = false;
  }
}

function persistKeyPreference(){
  const key = apiKeyEl.value.trim();
  try{
    if (key) sessionStorage.setItem(KEY_API_SESSION, key);
    else sessionStorage.removeItem(KEY_API_SESSION);

    if (rememberKeyEl.checked && key){
      localStorage.setItem(KEY_API, key);
    }else{
      localStorage.removeItem(KEY_API);
    }
  }catch(_error){
    showError("APIキーの保存に失敗しました。保存せずに使うか、ブラウザのストレージ設定を確認してください。");
  }
}

function clearSavedKey(){
  localStorage.removeItem(KEY_API);
  sessionStorage.removeItem(KEY_API_SESSION);
  apiKeyEl.value = "";
  rememberKeyEl.checked = false;
  updateRuntimeStatus();
}

function selectedRuntime(){
  const mode = runtimeModeEl.value;
  if (mode === "claude") return "claude";
  if (mode === "anthropic") return "anthropic";
  if (hasClaudeRuntime()) return "claude";
  if (apiKeyEl.value.trim()) return "anthropic";
  return "none";
}

function selectedModel(){
  return modelNameEl.value.trim() || "claude-sonnet-4-6";
}

function revealApiKeyInput(){
  if (apiPanelEl && "open" in apiPanelEl){
    apiPanelEl.open = true;
  }
  requestAnimationFrame(() => {
    apiKeyEl.focus();
  });
}

function buildSystemPrompt(dir){
  const target = dir === "zh2ja"
    ? "入力された中国語を自然な日本語へ翻訳し、中国語側を解析してください。"
    : "入力された日本語を自然な中国語（簡体字）へ翻訳し、翻訳後の中国語側を解析してください。";

  return `あなたは中国語と日本語に精通した言語解析エンジンです。
${target}

返答はJSONオブジェクトのみです。説明文、Markdown、コードフェンスは絶対に付けないでください。
次の構造を厳密に守ってください。

{
  "translation": "翻訳文。zh2jaでは日本語、ja2zhでは中国語簡体字",
  "words": [
    {
      "zh": "中国語の語または短い句",
      "pinyin": "声調記号付きピンイン。例: nǐ hǎo",
      "meaning": "日本語の意味",
      "pos": "品詞。例: 名詞、動詞、形容詞、副詞、代詞、助詞、量詞、接続詞、感嘆詞"
    }
  ],
  "native_pinyin": [
    { "py": "実際の発音に近いピンインの音節または語", "sandhi": true }
  ]
}

native_pinyinは中国語全文の読みです。声調変化が起きた音節は、変化後の声調で書き、sandhiをtrueにしてください。
代表例: 你好は nǐ + hǎo ではなく、実際の発音に合わせて ní / hǎo とし、níをsandhi trueにします。
句読点はwordsとnative_pinyinに含めなくて構いません。`;
}

function buildUserPrompt(text, dir){
  return dir === "zh2ja"
    ? `次の中国語を解析してください:\n${text}`
    : `次の日本語を中国語へ翻訳し、翻訳後の中国語を解析してください:\n${text}`;
}

function buildExamplePrompt(word){
  return `次の中国語単語を使った短い例文を3つ作ってください。JSONのみで返してください。
単語: ${word.zh}
ピンイン: ${word.pinyin}
意味: ${word.meaning}

{
  "examples": [
    { "zh": "中国語例文", "pinyin": "声調記号付きピンイン", "ja": "日本語訳" }
  ]
}`;
}

async function callAnthropicAPI(system, user, maxTokens=1400){
  const key = apiKeyEl.value.trim();
  if (!key){
    revealApiKeyInput();
    throw new Error("Anthropic APIキーを入力するか、Claude環境で実行してください。");
  }
  persistKeyPreference();

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: selectedModel(),
      max_tokens: maxTokens,
      system,
      messages: [{ role: "user", content: user }]
    })
  });

  if (!response.ok){
    let detail = "";
    try{
      const errorBody = await response.json();
      detail = errorBody.error && errorBody.error.message ? ` ${errorBody.error.message}` : "";
    }catch(_err){}
    throw new Error(`Anthropic APIが ${response.status} を返しました。${detail}`);
  }

  const data = await response.json();
  return (data.content || [])
    .map(block => block.type === "text" ? block.text : "")
    .join("\n");
}

async function callModel(system, user, maxTokens=1400){
  const runtime = selectedRuntime();
  if (runtime === "claude"){
    if (!hasClaudeRuntime()){
      throw new Error("Claude環境が検出できません。実行モードを「Anthropic APIキー」に切り替えるか、Claude内で開いてください。");
    }
    return window.claude.complete(`${system}\n\n${user}`);
  }
  if (runtime === "anthropic"){
    return callAnthropicAPI(system, user, maxTokens);
  }
  revealApiKeyInput();
  throw new Error("Claude環境が見つかりません。通常ブラウザで使う場合はAnthropic APIキーを入力してください。");
}

function parseModelJSON(raw){
  let s = String(raw || "").trim();
  s = s.replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/i, "");
  const first = s.indexOf("{");
  const last = s.lastIndexOf("}");
  if (first !== -1 && last !== -1) s = s.slice(first, last + 1);
  return JSON.parse(s);
}

function esc(value){
  return String(value ?? "").replace(/[&<>"]/g, ch => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;"
  }[ch]));
}

function showError(message){
  errEl.innerHTML = message;
  errEl.classList.add("show");
}

function setDirection(next){
  stopVoiceInput();
  direction = next;
  const zh = next === "zh2ja";
  dirZhBtn.setAttribute("aria-pressed", String(zh));
  dirJaBtn.setAttribute("aria-pressed", String(!zh));
  inputLabel.textContent = zh ? "中国語の文章" : "日本語の文章";
  voiceBtn.textContent = zh ? "中国語で音声入力" : "日本語で音声入力";
  inputEl.classList.toggle("hanzi", zh);
  inputEl.placeholder = zh
    ? "例: 你好，我想喝一杯咖啡。"
    : "例: 明日の朝、駅で友だちと会います。";
  errEl.classList.remove("show");
}

function pickChineseVoice(){
  if (!window.speechSynthesis) return;
  const voices = speechSynthesis.getVoices();
  zhVoice =
    voices.find(v => /^zh[-_]CN/i.test(v.lang)) ||
    voices.find(v => /^zh/i.test(v.lang)) ||
    null;
}

function speak(text, btn){
  if (!text || !window.speechSynthesis) return;
  if (btn && btn.classList.contains("speaking")){
    speechSynthesis.cancel();
    return;
  }
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "zh-CN";
  utterance.rate = Number(speechRateEl.value) || 0.9;
  if (zhVoice) utterance.voice = zhVoice;

  const clear = () => document.querySelectorAll(".speak.speaking")
    .forEach(item => item.classList.remove("speaking"));
  utterance.onstart = () => {
    clear();
    if (btn) btn.classList.add("speaking");
  };
  utterance.onend = clear;
  utterance.onerror = clear;
  speechSynthesis.speak(utterance);
}

function speechRecognitionCtor(){
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}

function voiceLanguage(){
  return direction === "zh2ja" ? "zh-CN" : "ja-JP";
}

function setVoiceState(text, active=false){
  voiceStateEl.textContent = text;
  voiceStateEl.classList.toggle("active", active);
  voiceBtn.classList.toggle("listening", active);
}

function joinVoiceText(base, transcript){
  const cleanBase = String(base || "").trimEnd();
  const cleanTranscript = String(transcript || "").trim();
  if (!cleanBase) return cleanTranscript;
  if (!cleanTranscript) return cleanBase;
  return `${cleanBase}\n${cleanTranscript}`;
}

function stopVoiceInput(){
  if (recognition && isListening){
    recognition.stop();
  }
}

function startVoiceInput(){
  const Recognition = speechRecognitionCtor();
  errEl.classList.remove("show");
  if (!Recognition){
    showError("このブラウザは音声入力に対応していません。iPhoneではSafari、PCではChromeやEdgeで試してください。");
    return;
  }
  if (isListening){
    stopVoiceInput();
    return;
  }
  if (window.speechSynthesis) speechSynthesis.cancel();
  recognition = new Recognition();
  recognition.lang = voiceLanguage();
  recognition.interimResults = true;
  recognition.continuous = false;
  recognition.maxAlternatives = 1;
  voiceBaseText = inputEl.value;
  voiceFinalText = "";

  recognition.onstart = () => {
    isListening = true;
    setVoiceState(`${direction === "zh2ja" ? "中国語" : "日本語"}を聞き取っています`, true);
  };
  recognition.onresult = event => {
    let interim = "";
    for (let i = event.resultIndex; i < event.results.length; i++){
      const piece = event.results[i][0] ? event.results[i][0].transcript : "";
      if (event.results[i].isFinal){
        voiceFinalText += piece;
      }else{
        interim += piece;
      }
    }
    inputEl.value = joinVoiceText(voiceBaseText, voiceFinalText + interim);
  };
  recognition.onerror = event => {
    const message = event.error === "not-allowed"
      ? "マイクの使用が許可されませんでした。ブラウザのマイク許可を確認してください。"
      : ["no-speech", "audio-capture", "aborted"].includes(event.error)
        ? "音声をうまく聞き取れませんでした。もう一度試すか、キーボード入力を使ってください。"
        : `音声入力でエラーが起きました: ${event.error}`;
    showError(message);
  };
  recognition.onend = () => {
    isListening = false;
    setVoiceState(voiceFinalText ? "音声入力を反映しました" : "", false);
    if (voiceFinalText && autoAnalyzeVoiceEl.checked){
      run();
    }
  };
  recognition.start();
}

function normalizedData(data){
  return {
    translation: String(data.translation || ""),
    words: Array.isArray(data.words) ? data.words : [],
    native_pinyin: Array.isArray(data.native_pinyin) ? data.native_pinyin : []
  };
}

function favoriteKey(word){
  return `${word.zh}|${word.pinyin}`;
}

function getFavorites(){
  return readJSON(KEY_FAVORITES, []);
}

function isFavorite(word){
  const key = favoriteKey(word);
  return getFavorites().some(item => favoriteKey(item) === key);
}

function toggleFavorite(index){
  if (!lastResult || !lastResult.words[index]) return;
  const word = lastResult.words[index];
  const key = favoriteKey(word);
  let favorites = getFavorites();
  if (favorites.some(item => favoriteKey(item) === key)){
    favorites = favorites.filter(item => favoriteKey(item) !== key);
  }else{
    favorites.unshift({ ...word, savedAt: Date.now() });
  }
  writeJSON(KEY_FAVORITES, favorites.slice(0, 200));
  renderActiveTab();
}

function addHistory(originalText, data){
  const item = {
    id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`,
    at: Date.now(),
    direction,
    originalText,
    data: normalizedData(data)
  };
  const history = readJSON(KEY_HISTORY, []);
  writeJSON(KEY_HISTORY, [item, ...history].slice(0, 50));
}

function restoreHistory(id){
  const item = readJSON(KEY_HISTORY, []).find(entry => entry.id === id);
  if (!item) return;
  setDirection(item.direction);
  inputEl.value = item.originalText;
  lastOriginalText = item.originalText;
  lastResult = item.data;
  setActiveTab("results");
}

function deleteHistory(id){
  writeJSON(KEY_HISTORY, readJSON(KEY_HISTORY, []).filter(entry => entry.id !== id));
  renderHistory();
}

function formatDate(ts){
  return new Date(ts).toLocaleString("ja-JP", { month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" });
}

function nativeLineHTML(native){
  return native.map(item => {
    const py = esc(item.py);
    return item.sandhi
      ? `<span class="sandhi" title="声調変化あり">${py}</span>`
      : `<span>${py}</span>`;
  }).join(" ");
}

function wordCardHTML(word, index){
  const fav = isFavorite(word);
  const examples = Array.isArray(word.examples) ? word.examples : [];
  const examplesHTML = examples.length ? `
    <div class="examples">
      ${examples.map(ex => `
        <p class="example-line hanzi">${esc(ex.zh)}</p>
        <p class="example-line py">${esc(ex.pinyin)}</p>
        <p class="example-line mean">${esc(ex.ja)}</p>`).join("")}
    </div>` : "";

  return `
    <article class="card">
      <div class="card-top">
        <div>
          <div class="zh hanzi">${esc(word.zh)}</div>
          <div class="py">${esc(word.pinyin)}</div>
        </div>
        <div class="icon-row">
          <button class="speak speak-sm" type="button" data-say="${esc(word.zh)}" aria-label="${esc(word.zh)}を読み上げ" title="読み上げ">▶</button>
          <button class="icon-btn icon-sm ${fav ? "active" : ""}" type="button" data-fav-index="${index}" aria-label="単語帳に保存" title="単語帳">☆</button>
        </div>
      </div>
      <div class="mean">${esc(word.meaning)}</div>
      <span class="pos">${esc(word.pos)}</span>
      <div class="controls" style="margin-top:10px">
        <button class="ghost" type="button" data-example-index="${index}">例文</button>
      </div>
      ${examplesHTML}
    </article>`;
}

function render(data, originalText, save=true){
  const clean = normalizedData(data);
  lastResult = clean;
  lastOriginalText = originalText;
  activeTab = "results";
  if (save) addHistory(originalText, clean);
  renderActiveTab();
}

function renderResults(){
  if (!lastResult){
    resEl.innerHTML = `<p class="translation">まだ解析結果はありません。</p>`;
    return;
  }
  const clean = normalizedData(lastResult);
  const chineseText = direction === "zh2ja" ? lastOriginalText : clean.translation;
  const sourceLabel = direction === "zh2ja" ? "原文" : "入力文";
  const translationLabel = direction === "zh2ja" ? "日本語訳" : "中国語訳";
  const cards = clean.words.map((word, index) => wordCardHTML(word, index)).join("");

  resEl.innerHTML = `
    <div class="block">
      <div class="block-head">
        <span class="eyebrow">${sourceLabel}</span>
        ${direction === "zh2ja" ? `<button class="speak" type="button" data-say="${esc(chineseText)}" aria-label="全文を読み上げ" title="全文を読み上げ">▶</button>` : ""}
      </div>
      <p class="translation ${direction === "zh2ja" ? "hanzi" : ""}">${esc(lastOriginalText)}</p>
    </div>

    <div class="block translation-output">
      <div class="block-head">
        <span class="eyebrow">${translationLabel}</span>
        ${direction === "ja2zh" ? `<button class="speak" type="button" data-say="${esc(chineseText)}" aria-label="中国語訳を読み上げ" title="中国語訳を読み上げ">▶</button>` : ""}
      </div>
      <p class="translation ${direction === "ja2zh" ? "hanzi" : ""}">${esc(clean.translation)}</p>
    </div>

    <div class="block">
      <span class="eyebrow">ネイティブ読み</span>
      <p class="native hanzi">${nativeLineHTML(clean.native_pinyin) || "ピンインが返されませんでした。"}</p>
      <p class="legend"><span class="sandhi">下線付きの金色</span> = 実際の発音で声調が変化した箇所</p>
    </div>

    <div class="block">
      <span class="eyebrow">単語解析</span>
      <div class="cards">${cards || "<p class=\"translation\">単語解析が返されませんでした。</p>"}</div>
    </div>`;
}

function renderHistory(){
  const history = readJSON(KEY_HISTORY, []);
  if (!history.length){
    resEl.innerHTML = `<p class="translation">履歴はまだありません。</p>`;
    return;
  }
  resEl.innerHTML = `
    <div class="block">
      <div class="block-head">
        <span class="eyebrow">履歴</span>
        <button class="ghost" type="button" data-clear-history="1">履歴を消去</button>
      </div>
      <div class="saved-list">
        ${history.map(item => `
          <article class="saved-item">
            <div class="pos">${formatDate(item.at)} / ${item.direction === "zh2ja" ? "中→日" : "日→中"}</div>
            <div class="history-text">${esc(item.originalText)}</div>
            <button class="secondary" type="button" data-history-id="${esc(item.id)}">開く</button>
            <button class="ghost" type="button" data-delete-history="${esc(item.id)}">削除</button>
          </article>`).join("")}
      </div>
    </div>`;
}

function renderFavorites(){
  const favorites = getFavorites();
  if (!favorites.length){
    resEl.innerHTML = `<p class="translation">単語帳はまだ空です。単語カードの☆で保存できます。</p>`;
    return;
  }
  resEl.innerHTML = `
    <div class="block">
      <div class="block-head">
        <span class="eyebrow">単語帳</span>
        <button class="ghost" type="button" data-clear-favorites="1">単語帳を空にする</button>
      </div>
      <div class="cards">
        ${favorites.map((word, index) => `
          <article class="card">
            <div class="card-top">
              <div>
                <div class="zh hanzi">${esc(word.zh)}</div>
                <div class="py">${esc(word.pinyin)}</div>
              </div>
              <button class="speak speak-sm" type="button" data-say="${esc(word.zh)}" aria-label="${esc(word.zh)}を読み上げ" title="読み上げ">▶</button>
            </div>
            <div class="mean">${esc(word.meaning)}</div>
            <span class="pos">${esc(word.pos)}</span>
            <button class="ghost" type="button" data-remove-fav="${index}">削除</button>
          </article>`).join("")}
      </div>
    </div>`;
}

function setActiveTab(tab){
  activeTab = tab;
  tabResultsBtn.setAttribute("aria-pressed", String(tab === "results"));
  tabHistoryBtn.setAttribute("aria-pressed", String(tab === "history"));
  tabFavoritesBtn.setAttribute("aria-pressed", String(tab === "favorites"));
  renderActiveTab();
}

function renderActiveTab(){
  document.body.classList.toggle("hide-pinyin", hidePinyinEl.checked);
  document.body.classList.toggle("hide-meaning", hideMeaningEl.checked);
  document.body.classList.toggle("hide-translation", hideTranslationEl.checked);
  if (activeTab === "history") renderHistory();
  else if (activeTab === "favorites") renderFavorites();
  else renderResults();
}

function resultText(){
  if (!lastResult) return "";
  const clean = normalizedData(lastResult);
  const lines = [
    `入力: ${lastOriginalText}`,
    `翻訳: ${clean.translation}`,
    "",
    "読み:",
    clean.native_pinyin.map(item => item.py).join(" "),
    "",
    "単語:",
    ...clean.words.map(word => `${word.zh} / ${word.pinyin} / ${word.meaning} / ${word.pos}`)
  ];
  return lines.join("\n");
}

async function copyResult(){
  const text = resultText();
  if (!text){
    showError("コピーできる解析結果がまだありません。");
    return;
  }
  try{
    if (!navigator.clipboard || !navigator.clipboard.writeText){
      throw new Error("Clipboard API unavailable");
    }
    await navigator.clipboard.writeText(text);
    copyResultBtn.textContent = "コピー済み";
    setTimeout(() => { copyResultBtn.textContent = "結果をコピー"; }, 1200);
  }catch(_error){
    const manual = document.createElement("textarea");
    manual.value = text;
    manual.setAttribute("readonly", "");
    manual.style.position = "fixed";
    manual.style.left = "-9999px";
    document.body.appendChild(manual);
    manual.select();
    const ok = document.execCommand && document.execCommand("copy");
    document.body.removeChild(manual);
    if (ok){
      copyResultBtn.textContent = "コピー済み";
      setTimeout(() => { copyResultBtn.textContent = "結果をコピー"; }, 1200);
    }else{
      showError("自動コピーできませんでした。ブラウザの共有メニューか、表示中の結果を手動でコピーしてください。");
    }
  }
}

async function generateExamples(index){
  if (!lastResult || !lastResult.words[index]) return;
  const word = lastResult.words[index];
  const btn = document.querySelector(`[data-example-index="${index}"]`);
  if (btn) btn.disabled = true;
  try{
    const raw = await callModel("あなたは中国語学習用の例文作成エンジンです。返答はJSONのみです。", buildExamplePrompt(word), 900);
    const parsed = parseModelJSON(raw);
    lastResult.words[index].examples = Array.isArray(parsed.examples) ? parsed.examples : [];
    renderActiveTab();
  }catch(error){
    showError(`<b>例文を作れませんでした。</b> ${esc(error.message)}`);
  }finally{
    if (btn) btn.disabled = false;
  }
}

async function run(){
  const text = inputEl.value.trim();
  errEl.classList.remove("show");
  if (!text){
    showError("解析する文章を入力してください。");
    return;
  }
  runBtn.disabled = true;
  loadEl.classList.add("show");
  if (window.speechSynthesis) speechSynthesis.cancel();
  try{
    const raw = await callModel(buildSystemPrompt(direction), buildUserPrompt(text, direction));
    const parsed = parseModelJSON(raw);
    render(parsed, text, true);
  }catch(error){
    showError(`<b>解析できませんでした。</b> ${esc(error.message)}`);
  }finally{
    runBtn.disabled = false;
    loadEl.classList.remove("show");
  }
}

function savePrefs(){
  writeJSON(KEY_PREFS, {
    speechRate: speechRateEl.value,
    hidePinyin: hidePinyinEl.checked,
    hideMeaning: hideMeaningEl.checked,
    hideTranslation: hideTranslationEl.checked,
    autoAnalyzeVoice: autoAnalyzeVoiceEl.checked
  });
}

function loadPrefs(){
  const prefs = readJSON(KEY_PREFS, {});
  if (prefs.speechRate) speechRateEl.value = prefs.speechRate;
  hidePinyinEl.checked = Boolean(prefs.hidePinyin);
  hideMeaningEl.checked = Boolean(prefs.hideMeaning);
  hideTranslationEl.checked = Boolean(prefs.hideTranslation);
  autoAnalyzeVoiceEl.checked = Boolean(prefs.autoAnalyzeVoice);
}

dirZhBtn.addEventListener("click", () => setDirection("zh2ja"));
dirJaBtn.addEventListener("click", () => setDirection("ja2zh"));
runtimeModeEl.addEventListener("change", updateRuntimeStatus);
apiKeyEl.addEventListener("input", () => {
  persistKeyPreference();
  updateRuntimeStatus();
});
rememberKeyEl.addEventListener("change", persistKeyPreference);
clearKeyBtn.addEventListener("click", clearSavedKey);
runBtn.addEventListener("click", run);
voiceBtn.addEventListener("click", startVoiceInput);
copyResultBtn.addEventListener("click", copyResult);
tabResultsBtn.addEventListener("click", () => setActiveTab("results"));
tabHistoryBtn.addEventListener("click", () => setActiveTab("history"));
tabFavoritesBtn.addEventListener("click", () => setActiveTab("favorites"));
[speechRateEl, hidePinyinEl, hideMeaningEl, hideTranslationEl, autoAnalyzeVoiceEl].forEach(el => {
  el.addEventListener("change", () => {
    savePrefs();
    renderActiveTab();
  });
});
inputEl.addEventListener("keydown", event => {
  if ((event.ctrlKey || event.metaKey) && event.key === "Enter") run();
});
document.addEventListener("click", event => {
  const speakBtn = event.target.closest(".speak");
  if (speakBtn) speak(speakBtn.dataset.say, speakBtn);

  const favBtn = event.target.closest("[data-fav-index]");
  if (favBtn) toggleFavorite(Number(favBtn.dataset.favIndex));

  const exampleBtn = event.target.closest("[data-example-index]");
  if (exampleBtn) generateExamples(Number(exampleBtn.dataset.exampleIndex));

  const historyBtn = event.target.closest("[data-history-id]");
  if (historyBtn) restoreHistory(historyBtn.dataset.historyId);

  const deleteHistoryBtn = event.target.closest("[data-delete-history]");
  if (deleteHistoryBtn) deleteHistory(deleteHistoryBtn.dataset.deleteHistory);

  const removeFavBtn = event.target.closest("[data-remove-fav]");
  if (removeFavBtn){
    const favorites = getFavorites();
    favorites.splice(Number(removeFavBtn.dataset.removeFav), 1);
    writeJSON(KEY_FAVORITES, favorites);
    renderFavorites();
  }

  if (event.target.closest("[data-clear-history]")){
    writeJSON(KEY_HISTORY, []);
    renderHistory();
  }

  if (event.target.closest("[data-clear-favorites]")){
    writeJSON(KEY_FAVORITES, []);
    renderFavorites();
  }
});

if (window.speechSynthesis){
  pickChineseVoice();
  speechSynthesis.onvoiceschanged = pickChineseVoice;
}

loadSavedKey();
loadPrefs();
updateRuntimeStatus();
setDirection("zh2ja");
renderActiveTab();
</script>
