<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中文解析 - 中国語学習ツール</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<meta name="theme-color" content="#c8442e">
<style>
  :root{
    --ink:#1a1410;
    --paper:#f7f3ea;
    --surface:#fffdf8;
    --vermilion:#c8442e;
    --jade:#2f6f5e;
    --gold:#b08838;
    --line:#e6ddc9;
    --muted:#756b62;
    --bad:#9f2f25;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;
    padding:clamp(16px,4vw,44px);
    background:var(--paper);
    color:var(--ink);
    font-family:"Hiragino Sans","Noto Sans JP","Yu Gothic",-apple-system,
      BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    line-height:1.7;
  }
  .wrap{max-width:960px;margin:0 auto}
  .hanzi{font-family:"Songti SC","SimSun","Noto Serif SC",serif}
  header{
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;
    margin-bottom:22px;
    display:flex;
    gap:14px;
    align-items:flex-end;
    justify-content:space-between;
    flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:12px;min-width:260px}
  .seal{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:44px;
    height:44px;
    border-radius:6px;
    background:var(--vermilion);
    color:var(--paper);
    font-size:1.65rem;
    font-weight:800;
    line-height:1;
  }
  h1{
    margin:0;
    font-size:clamp(1.3rem,4vw,1.95rem);
    line-height:1.25;
    letter-spacing:0;
  }
  .sub{margin:2px 0 0;color:var(--muted);font-size:.92rem}
  .status{
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--muted);
    border-radius:6px;
    padding:.38rem .65rem;
    font-size:.8rem;
    white-space:nowrap;
  }
  .status.ready{border-color:rgba(47,111,94,.35);color:var(--jade)}
  .panel{
    display:grid;
    gap:14px;
    margin-bottom:26px;
  }
  .api-panel{
    display:grid;
    gap:10px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--surface);
    padding:12px;
  }
  .api-row{
    display:grid;
    grid-template-columns:minmax(170px,1fr) minmax(180px,1fr);
    gap:10px;
  }
  .field{display:grid;gap:5px}
  .field label{margin:0;font-size:.82rem;color:var(--muted)}
  input[type="password"],
  input[type="text"],
  select{
    width:100%;
    border:1.5px solid var(--line);
    border-radius:6px;
    background:#fff;
    color:var(--ink);
    padding:.58rem .68rem;
    font:inherit;
  }
  input:focus,
  select:focus{outline:3px solid rgba(176,136,56,.45);outline-offset:1px}
  .check{
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--muted);
    font-size:.84rem;
  }
  .check input{width:16px;height:16px}
  .api-note{margin:0;color:var(--muted);font-size:.8rem}
  .dir{
    display:inline-flex;
    width:max-content;
    border:1.5px solid var(--ink);
    border-radius:6px;
    overflow:hidden;
    background:var(--surface);
  }
  .dir button{
    appearance:none;
    border:0;
    border-radius:0;
    background:transparent;
    color:var(--muted);
    padding:.55rem .95rem;
    font-weight:700;
    font-size:.92rem;
    cursor:pointer;
  }
  .dir button[aria-pressed="true"]{background:var(--ink);color:var(--paper)}
  label{display:block;font-weight:700;margin-bottom:6px}
  textarea{
    display:block;
    width:100%;
    min-height:150px;
    resize:vertical;
    border:1.5px solid var(--ink);
    border-radius:6px;
    background:var(--surface);
    color:var(--ink);
    padding:15px;
    font-size:1.1rem;
    line-height:1.85;
  }
  textarea:focus{outline:3px solid rgba(176,136,56,.55);outline-offset:1px}
  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  button.action{
    appearance:none;
    border:0;
    border-radius:6px;
    background:var(--vermilion);
    color:var(--paper);
    padding:.72rem 1.35rem;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
  }
  button.action:hover:not(:disabled){filter:brightness(1.07)}
  button.action:active:not(:disabled){transform:translateY(1px)}
  button:disabled{opacity:.55;cursor:not-allowed}
  button:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .hint{color:var(--muted);font-size:.82rem}
  .loading{
    display:none;
    align-items:center;
    gap:.6rem;
    color:var(--jade);
    font-weight:700;
  }
  .loading.show{display:flex}
  .spinner{
    width:18px;
    height:18px;
    border:3px solid var(--line);
    border-top-color:var(--jade);
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.spinner{animation:none}}
  .error{
    display:none;
    border-left:4px solid var(--bad);
    background:#fbeae6;
    color:var(--ink);
    border-radius:0 6px 6px 0;
    padding:12px 14px;
  }
  .error.show{display:block}
  .error b{color:var(--bad)}
  #results{display:grid;gap:26px;margin-top:28px}
  .block{min-width:0}
  .block-head{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
  }
  .eyebrow{
    display:inline-block;
    color:var(--vermilion);
    border-bottom:1.5px solid var(--vermilion);
    padding-bottom:2px;
    font-size:.73rem;
    font-weight:800;
    letter-spacing:.16em;
    text-transform:uppercase;
  }
  .translation{
    margin:0;
    font-size:1.15rem;
    line-height:1.9;
    overflow-wrap:anywhere;
  }
  .native{
    margin:0;
    padding:14px 16px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--surface);
    color:var(--jade);
    font-size:1.08rem;
    line-height:2;
    overflow-wrap:anywhere;
  }
  .sandhi{
    color:var(--gold);
    font-weight:800;
    border-bottom:2px dotted var(--gold);
  }
  .legend{margin:.55rem 0 0;color:var(--muted);font-size:.82rem}
  .cards{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:12px;
  }
  .card{
    min-width:0;
    border:1px solid var(--line);
    border-top:3px solid var(--jade);
    border-radius:6px;
    background:var(--surface);
    padding:12px;
  }
  .card-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:8px;
  }
  .zh{font-size:1.62rem;font-weight:800;line-height:1.25;overflow-wrap:anywhere}
  .py{margin-top:2px;color:var(--vermilion);font-weight:800;overflow-wrap:anywhere}
  .mean{margin-top:8px;font-size:.94rem;overflow-wrap:anywhere}
  .pos{
    display:inline-block;
    margin-top:9px;
    border-radius:3px;
    background:var(--line);
    color:var(--muted);
    padding:.1rem .42rem;
    font-size:.72rem;
    font-weight:700;
  }
  .speak{
    appearance:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:34px;
    height:34px;
    flex:0 0 auto;
    border:1.5px solid var(--jade);
    border-radius:50%;
    background:transparent;
    color:var(--jade);
    cursor:pointer;
    font-size:1rem;
    line-height:1;
  }
  .speak:hover{background:var(--jade);color:var(--paper)}
  .speak.speaking{background:var(--jade);color:var(--paper)}
  .speak-sm{width:29px;height:29px;font-size:.86rem}
  footer{
    margin-top:38px;
    border-top:1px solid var(--line);
    padding-top:12px;
    color:var(--muted);
    font-size:.8rem;
  }
  @media (max-width:540px){
    body{padding:14px}
    header{align-items:flex-start}
    .status{white-space:normal}
    .dir{display:grid;grid-template-columns:1fr 1fr;width:100%}
    .dir button{padding:.55rem .5rem}
    .cards{grid-template-columns:1fr}
    .api-row{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="seal hanzi">解</span>
      <div>
        <h1>中文解析</h1>
        <p class="sub">翻訳、ピンイン、声調変化、語彙をまとめて確認</p>
      </div>
    </div>
    <div class="status" id="runtimeStatus">Claude接続を確認中</div>
  </header>

  <main>
    <section class="panel" aria-label="入力">
      <div class="dir" role="group" aria-label="翻訳方向">
        <button id="dirZh" type="button" aria-pressed="true">中国語 → 日本語</button>
        <button id="dirJa" type="button" aria-pressed="false">日本語 → 中国語</button>
      </div>

      <div class="api-panel" aria-label="AI接続設定">
        <div class="api-row">
          <div class="field">
            <label for="runtimeMode">実行モード</label>
            <select id="runtimeMode">
              <option value="auto">自動</option>
              <option value="claude">Claude環境</option>
              <option value="anthropic">Anthropic APIキー</option>
            </select>
          </div>
          <div class="field">
            <label for="modelName">モデル</label>
            <input id="modelName" type="text" value="claude-sonnet-4-6" autocomplete="off">
          </div>
        </div>
        <div class="field">
          <label for="apiKey">Anthropic APIキー</label>
          <input id="apiKey" type="password" placeholder="sk-ant-..." autocomplete="off">
        </div>
        <label class="check" for="rememberKey">
          <input id="rememberKey" type="checkbox">
          このブラウザにAPIキーを保存する
        </label>
        <p class="api-note">通常ブラウザで使う場合だけAPIキーを入力してください。保存しない場合、キーはこのページを開いている間だけ使います。</p>
      </div>

      <div>
        <label for="input" id="inputLabel">中国語の文章</label>
        <textarea id="input" class="hanzi" placeholder="例: 你好，我想喝一杯咖啡。"></textarea>
      </div>

      <div class="controls">
        <button id="run" class="action" type="button">解析する</button>
        <span class="hint">Ctrl + Enter でも実行</span>
      </div>

      <div class="loading" id="loading" aria-live="polite">
        <span class="spinner" aria-hidden="true"></span>
        <span>解析中です</span>
      </div>
      <div class="error" id="error" role="alert"></div>
    </section>

    <section id="results" aria-live="polite"></section>
  </main>

  <footer>Claude環境ではAPIキーなしで動作します。通常ブラウザではAnthropic APIキーを入力して実行できます。</footer>
</div>

<script>
const $ = id => document.getElementById(id);
const inputEl = $("input");
const runBtn = $("run");
const loadEl = $("loading");
const errEl = $("error");
const resEl = $("results");
const statusEl = $("runtimeStatus");
const dirZhBtn = $("dirZh");
const dirJaBtn = $("dirJa");
const inputLabel = $("inputLabel");
const runtimeModeEl = $("runtimeMode");
const modelNameEl = $("modelName");
const apiKeyEl = $("apiKey");
const rememberKeyEl = $("rememberKey");

const STORAGE_KEY = "trancerate.anthropicApiKey";
// 個人利用でスマホから開きたい場合は、次の空文字にAnthropic APIキーを入れます。
// 例: const BUILT_IN_ANTHROPIC_API_KEY = "sk-ant-...";
// 公開URLに置くとキーも見えるため、自分だけが開く場所で使ってください。
const BUILT_IN_ANTHROPIC_API_KEY = "";

let direction = "zh2ja";
let zhVoice = null;

function hasClaudeRuntime(){
  return Boolean(window.claude && typeof window.claude.complete === "function");
}

function updateRuntimeStatus(){
  const mode = runtimeModeEl.value;
  const hasKey = apiKeyEl.value.trim().length > 0;
  if ((mode === "auto" && hasClaudeRuntime()) || mode === "claude"){
    statusEl.textContent = hasClaudeRuntime() ? "Claude接続: 利用可" : "Claude接続: 未検出";
    statusEl.classList.toggle("ready", hasClaudeRuntime());
  }else if (mode === "anthropic" || (mode === "auto" && hasKey)){
    statusEl.textContent = hasKey ? "Anthropic API: キー利用可" : "Anthropic API: キー未入力";
    statusEl.classList.toggle("ready", hasKey);
  }else{
    statusEl.textContent = "AI接続: 未設定";
    statusEl.classList.remove("ready");
  }
}

function loadSavedKey(){
  const saved = localStorage.getItem(STORAGE_KEY);
  if (BUILT_IN_ANTHROPIC_API_KEY){
    apiKeyEl.value = BUILT_IN_ANTHROPIC_API_KEY;
    apiKeyEl.placeholder = "コード内APIキーを使用中";
    rememberKeyEl.checked = false;
  }else if (saved){
    apiKeyEl.value = saved;
    rememberKeyEl.checked = true;
  }
}

function persistKeyPreference(){
  if (BUILT_IN_ANTHROPIC_API_KEY) return;
  const key = apiKeyEl.value.trim();
  if (rememberKeyEl.checked && key){
    localStorage.setItem(STORAGE_KEY, key);
  }else{
    localStorage.removeItem(STORAGE_KEY);
  }
}

function selectedRuntime(){
  const mode = runtimeModeEl.value;
  if (mode === "claude") return "claude";
  if (mode === "anthropic") return "anthropic";
  if (hasClaudeRuntime()) return "claude";
  if (apiKeyEl.value.trim()) return "anthropic";
  return "none";
}

function selectedModel(){
  return modelNameEl.value.trim() || "claude-sonnet-4-6";
}

async function callAnthropicAPI(text, dir){
  const key = apiKeyEl.value.trim();
  if (!key){
    throw new Error("Anthropic APIキーを入力するか、Claude環境で実行してください。");
  }
  persistKeyPreference();

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: selectedModel(),
      max_tokens: 1400,
      system: buildSystemPrompt(dir),
      messages: [{ role: "user", content: buildUserPrompt(text, dir) }]
    })
  });

  if (!response.ok){
    let detail = "";
    try{
      const errorBody = await response.json();
      detail = errorBody.error && errorBody.error.message ? ` ${errorBody.error.message}` : "";
    }catch(_err){}
    throw new Error(`Anthropic APIが ${response.status} を返しました。${detail}`);
  }

  const data = await response.json();
  return (data.content || [])
    .map(block => block.type === "text" ? block.text : "")
    .join("\n");
}

async function callModel(text, dir){
  const runtime = selectedRuntime();
  if (runtime === "claude"){
    if (!hasClaudeRuntime()){
      throw new Error("Claude環境が検出できません。実行モードを「Anthropic APIキー」に切り替えるか、Claude内で開いてください。");
    }
    const prompt = `${buildSystemPrompt(dir)}\n\n${buildUserPrompt(text, dir)}`;
    return window.claude.complete(prompt);
  }

  if (runtime === "anthropic"){
    return callAnthropicAPI(text, dir);
  }

  throw new Error("Claude環境が見つかりません。通常ブラウザで使う場合はAnthropic APIキーを入力してください。");
}

function setDirection(next){
  direction = next;
  const zh = next === "zh2ja";
  dirZhBtn.setAttribute("aria-pressed", String(zh));
  dirJaBtn.setAttribute("aria-pressed", String(!zh));
  inputLabel.textContent = zh ? "中国語の文章" : "日本語の文章";
  inputEl.classList.toggle("hanzi", zh);
  inputEl.placeholder = zh
    ? "例: 你好，我想喝一杯咖啡。"
    : "例: 明日の朝、駅で友だちと会います。";
  resEl.innerHTML = "";
  errEl.classList.remove("show");
}

function buildSystemPrompt(dir){
  const target = dir === "zh2ja"
    ? "入力された中国語を自然な日本語へ翻訳し、中国語側を解析してください。"
    : "入力された日本語を自然な中国語（簡体字）へ翻訳し、翻訳後の中国語側を解析してください。";

  return `あなたは中国語と日本語に精通した言語解析エンジンです。
${target}

返答はJSONオブジェクトのみです。説明文、Markdown、コードフェンスは絶対に付けないでください。
次の構造を厳密に守ってください。

{
  "translation": "翻訳文。zh2jaでは日本語、ja2zhでは中国語簡体字",
  "words": [
    {
      "zh": "中国語の語または短い句",
      "pinyin": "声調記号付きピンイン。例: nǐ hǎo",
      "meaning": "日本語の意味",
      "pos": "品詞。例: 名詞、動詞、形容詞、副詞、代詞、助詞、量詞、接続詞、感嘆詞"
    }
  ],
  "native_pinyin": [
    { "py": "実際の発音に近いピンインの音節または語", "sandhi": true }
  ]
}

native_pinyinは中国語全文の読みです。声調変化が起きた音節は、変化後の声調で書き、sandhiをtrueにしてください。
代表例: 你好は nǐ + hǎo ではなく、実際の発音に合わせて ní / hǎo とし、níをsandhi trueにします。
句読点はwordsとnative_pinyinに含めなくて構いません。`;
}

function buildUserPrompt(text, dir){
  return dir === "zh2ja"
    ? `次の中国語を解析してください:\n${text}`
    : `次の日本語を中国語へ翻訳し、翻訳後の中国語を解析してください:\n${text}`;
}

function parseModelJSON(raw){
  let s = String(raw || "").trim();
  s = s.replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/i, "");
  const first = s.indexOf("{");
  const last = s.lastIndexOf("}");
  if (first !== -1 && last !== -1) s = s.slice(first, last + 1);
  return JSON.parse(s);
}

function esc(value){
  return String(value ?? "").replace(/[&<>"]/g, ch => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;"
  }[ch]));
}

function showError(message){
  errEl.innerHTML = message;
  errEl.classList.add("show");
}

function pickChineseVoice(){
  if (!window.speechSynthesis) return;
  const voices = speechSynthesis.getVoices();
  zhVoice =
    voices.find(v => /^zh[-_]CN/i.test(v.lang)) ||
    voices.find(v => /^zh/i.test(v.lang)) ||
    null;
}

function speak(text, btn){
  if (!text || !window.speechSynthesis) return;
  if (btn && btn.classList.contains("speaking")){
    speechSynthesis.cancel();
    return;
  }
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "zh-CN";
  utterance.rate = 0.9;
  if (zhVoice) utterance.voice = zhVoice;

  const clear = () => document.querySelectorAll(".speak.speaking")
    .forEach(item => item.classList.remove("speaking"));
  utterance.onstart = () => {
    clear();
    if (btn) btn.classList.add("speaking");
  };
  utterance.onend = clear;
  utterance.onerror = clear;
  speechSynthesis.speak(utterance);
}

function normalizedData(data){
  return {
    translation: String(data.translation || ""),
    words: Array.isArray(data.words) ? data.words : [],
    native_pinyin: Array.isArray(data.native_pinyin) ? data.native_pinyin : []
  };
}

function render(data, originalText){
  const clean = normalizedData(data);
  const chineseText = direction === "zh2ja" ? originalText : clean.translation;
  const sourceLabel = direction === "zh2ja" ? "原文" : "入力文";
  const translationLabel = direction === "zh2ja" ? "日本語訳" : "中国語訳";

  const nativeLine = clean.native_pinyin.map(item => {
    const py = esc(item.py);
    return item.sandhi
      ? `<span class="sandhi" title="声調変化あり">${py}</span>`
      : `<span>${py}</span>`;
  }).join(" ");

  const cards = clean.words.map(word => `
    <article class="card">
      <div class="card-top">
        <div>
          <div class="zh hanzi">${esc(word.zh)}</div>
          <div class="py">${esc(word.pinyin)}</div>
        </div>
        <button class="speak speak-sm" type="button" data-say="${esc(word.zh)}" aria-label="${esc(word.zh)}を読み上げ" title="読み上げ">▶</button>
      </div>
      <div class="mean">${esc(word.meaning)}</div>
      <span class="pos">${esc(word.pos)}</span>
    </article>`).join("");

  resEl.innerHTML = `
    <div class="block">
      <div class="block-head">
        <span class="eyebrow">${sourceLabel}</span>
        ${direction === "zh2ja" ? `<button class="speak" type="button" data-say="${esc(chineseText)}" aria-label="全文を読み上げ" title="全文を読み上げ">▶</button>` : ""}
      </div>
      <p class="translation ${direction === "zh2ja" ? "hanzi" : ""}">${esc(originalText)}</p>
    </div>

    <div class="block">
      <div class="block-head">
        <span class="eyebrow">${translationLabel}</span>
        ${direction === "ja2zh" ? `<button class="speak" type="button" data-say="${esc(chineseText)}" aria-label="中国語訳を読み上げ" title="中国語訳を読み上げ">▶</button>` : ""}
      </div>
      <p class="translation ${direction === "ja2zh" ? "hanzi" : ""}">${esc(clean.translation)}</p>
    </div>

    <div class="block">
      <span class="eyebrow">ネイティブ読み</span>
      <p class="native hanzi">${nativeLine || "ピンインが返されませんでした。"}</p>
      <p class="legend"><span class="sandhi">下線付きの金色</span> = 実際の発音で声調が変化した箇所</p>
    </div>

    <div class="block">
      <span class="eyebrow">単語解析</span>
      <div class="cards">${cards || "<p class=\"translation\">単語解析が返されませんでした。</p>"}</div>
    </div>`;
}

async function run(){
  const text = inputEl.value.trim();
  errEl.classList.remove("show");
  resEl.innerHTML = "";

  if (!text){
    showError("解析する文章を入力してください。");
    return;
  }

  runBtn.disabled = true;
  loadEl.classList.add("show");
  if (window.speechSynthesis) speechSynthesis.cancel();

  try{
    const raw = await callModel(text, direction);
    const parsed = parseModelJSON(raw);
    render(parsed, text);
  }catch(error){
    showError(`<b>解析できませんでした。</b> ${esc(error.message)}`);
  }finally{
    runBtn.disabled = false;
    loadEl.classList.remove("show");
  }
}

dirZhBtn.addEventListener("click", () => setDirection("zh2ja"));
dirJaBtn.addEventListener("click", () => setDirection("ja2zh"));
runtimeModeEl.addEventListener("change", updateRuntimeStatus);
apiKeyEl.addEventListener("input", () => {
  persistKeyPreference();
  updateRuntimeStatus();
});
rememberKeyEl.addEventListener("change", persistKeyPreference);
runBtn.addEventListener("click", run);
inputEl.addEventListener("keydown", event => {
  if ((event.ctrlKey || event.metaKey) && event.key === "Enter") run();
});
document.addEventListener("click", event => {
  const button = event.target.closest(".speak");
  if (button) speak(button.dataset.say, button);
});

if (window.speechSynthesis){
  pickChineseVoice();
  speechSynthesis.onvoiceschanged = pickChineseVoice;
}

loadSavedKey();
updateRuntimeStatus();
setDirection("zh2ja");
</script>
</body>
</html>
